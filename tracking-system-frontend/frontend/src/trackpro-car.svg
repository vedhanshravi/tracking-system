<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5DF2C4"/>
      <stop offset="50%" stop-color="#1DB085"/>
      <stop offset="100%" stop-color="#053D2A"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="28%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="carGrad" x1="100" y1="60" x2="100" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#E6FFF5"/>
      <stop offset="100%" stop-color="#9CE8C9"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <path d="M100 6C30 6 6 30 6 100s24 94 94 94 94-24 94-94S170 6 100 6Z" fill="url(#bgGrad)"/>
  <path d="M100 6C30 6 6 30 6 100s24 94 94 94 94-24 94-94S170 6 100 6Z" fill="url(#bgGlow)"/>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="158" rx="68" ry="3.5" fill="#000" opacity="0.3"/>

  <!--
    CAR — clean silhouette like reference:
    rounded high cabin dome, lower body, two big wheel arches with rims
  -->
  <!-- Solid silhouette body -->
  <path fill="url(#carGrad)" d="
    M 32 148
    L 32 124
    C 32 118 36 114 42 113
    L 54 111
    C 58 100 68 90 82 85
    C 100 79 124 80 140 89
    C 148 93 154 100 158 108
    L 164 111
    C 169 112 172 116 172 121
    L 172 148
    L 158 148
    A 18 18 0 0 0 122 148
    L 78 148
    A 18 18 0 0 0 42 148
    Z
  "/>

  <!-- Window cutouts (tinted) -->
  <path fill="#0A2F22" d="
    M 70 108
    C 74 99 82 93 92 90
    C 100 88 108 88 114 89
    L 110 108 Z
  "/>
  <path fill="#0A2F22" d="
    M 118 89
    C 128 91 138 96 144 103
    L 148 108
    L 118 108 Z
  "/>

  <!-- Wheels -->
  <g>
    <!-- Rear -->
    <circle cx="60" cy="148" r="16" fill="#0a0a0a"/>
    <circle cx="60" cy="148" r="9" fill="#1DB085"/>
    <circle cx="60" cy="148" r="2.5" fill="#053D2A"/>
    <g stroke="#053D2A" stroke-width="1.4" stroke-linecap="round">
      <line x1="60" y1="141" x2="60" y2="155"/>
      <line x1="53" y1="148" x2="67" y2="148"/>
      <line x1="55" y1="143" x2="65" y2="153"/>
      <line x1="65" y1="143" x2="55" y2="153"/>
    </g>
    <!-- Front -->
    <circle cx="140" cy="148" r="16" fill="#0a0a0a"/>
    <circle cx="140" cy="148" r="9" fill="#1DB085"/>
    <circle cx="140" cy="148" r="2.5" fill="#053D2A"/>
    <g stroke="#053D2A" stroke-width="1.4" stroke-linecap="round">
      <line x1="140" y1="141" x2="140" y2="155"/>
      <line x1="133" y1="148" x2="147" y2="148"/>
      <line x1="135" y1="143" x2="145" y2="153"/>
      <line x1="145" y1="143" x2="135" y2="153"/>
    </g>
  </g>

  <!-- Subtle door line -->
  <path d="M100 113 L100 140" stroke="#0A4A35" stroke-width="0.9" opacity="0.35" stroke-linecap="round"/>

  <!-- Headlight -->
  <circle cx="167" cy="128" r="2.5" fill="#5DF2C4"/>
  <circle cx="167" cy="128" r="4.5" fill="#5DF2C4" opacity="0.4"/>

  <!-- Taillight -->
  <rect x="34" y="125" width="5" height="4" rx="1.5" fill="#FF3B5C"/>
</svg>
