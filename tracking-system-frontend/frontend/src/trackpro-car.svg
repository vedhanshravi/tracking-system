<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4aeabf"/>
      <stop offset="55%" stop-color="#1db085"/>
      <stop offset="100%" stop-color="#08583d"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="30%" cy="18%" r="78%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="48" y1="44" x2="48" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cdffe9"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <path d="M48 3C14 3 3 14 3 48s11 45 45 45 45-11 45-45S82 3 48 3Z" fill="url(#bg)"/>
  <path d="M48 3C14 3 3 14 3 48s11 45 45 45 45-11 45-45S82 3 48 3Z" fill="url(#bgGlow)"/>

  <!-- Ground shadow -->
  <ellipse cx="48" cy="76" rx="32" ry="2.2" fill="#000" opacity="0.25"/>

  <!--
    SPORTS CAR — sleek fastback coupe, facing right
    Low-slung body, pointed nose on right, fastback roof tapering left,
    two oversized multi-spoke alloy wheels
  -->

  <!-- Main body silhouette -->
  <path d="M12 64
           C12 62 13.4 60.2 15.4 59.6
           L18 58.8
           C18 56 19.5 53.4 22 51.6
           L24.2 50
           C26 46 29 44 32.4 43.2
           L38 41.8
           C42 41 46 40.6 50 40.6
           C55 40.6 60 41.6 64.6 43.4
           L70.5 45.6
           C73 46.6 75.2 48.2 77 50.4
           L79.8 54
           C81.5 54.2 83 55.2 83.6 56.8
           L84.4 59
           L85 59.4
           C85.8 60 86 61 85.6 62
           L84.6 64
           C84 65.2 82.8 66 81.4 66
           L74 66
           A8.5 8.5 0 0 1 57 66
           L39 66
           A8.5 8.5 0 0 1 22 66
           L15 66
           C13.3 66 12 64.7 12 64 Z"
        fill="url(#bodyGrad)"/>

  <!-- Tinted window / cabin (single swept greenhouse) -->
  <path d="M31 50.4
           C34 47.6 38.5 45.6 43.5 44.8
           L50 44.2
           C54.4 44.2 58.2 44.8 61.8 46
           L66 47.4
           L62 53.4
           L31 53.4 Z"
        fill="#0a2f22"/>

  <!-- Window shine -->
  <path d="M35 49.4
           C38 47.8 42.5 46.6 47 46.4
           L46 52
           L34 52 Z"
        fill="#1a5b43" opacity="0.85"/>

  <!-- B-pillar -->
  <path d="M49 45 L49 53" stroke="url(#bodyGrad)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Side mirror (teardrop on left of cabin, driver side = right when facing right → mirror on top-front) -->
  <path d="M63 44.4
           C65.2 43.6 67 44.2 67 45.4
           C67 46.4 65.6 46.8 63.5 46.6 Z"
        fill="url(#bodyGrad)"/>

  <!-- Door line -->
  <path d="M48 56 L48 64" stroke="#0a2f22" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>

  <!-- Character crease along side -->
  <path d="M22 58 L76 58" stroke="#0a2f22" stroke-width="0.7" stroke-linecap="round" opacity="0.28"/>

  <!-- Front headlight (right side) -->
  <path d="M78 57.5 L82 59 L82 61.5 L79 61.5 Z" fill="#c6ff6b"/>

  <!-- Rear taillight (left side) -->
  <path d="M18 57.5 L14 59 L14 61.5 L17 61.5 Z" fill="#ff8e99" opacity="0.9"/>

  <!-- ===== Wheels with 6-petal alloy spokes ===== -->
  <!-- Rear wheel (left) -->
  <g transform="translate(30.5 66)">
    <circle r="8.2" fill="#0a1a12"/>
    <circle r="6.6" fill="#1a1d22"/>
    <circle r="5.1" fill="#ffffff"/>
    <!-- 6 petal spokes -->
    <g fill="#0a1a12">
      <path d="M0 -5 L1.4 -1.4 L-1.4 -1.4 Z"/>
      <g transform="rotate(60)"><path d="M0 -5 L1.4 -1.4 L-1.4 -1.4 Z"/></g>
      <g transform="rotate(120)"><path d="M0 -5 L1.4 -1.4 L-1.4 -1.4 Z"/></g>
      <g transform="rotate(180)"><path d="M0 -5 L1.4 -1.4 L-1.4 -1.4 Z"/></g>
      <g transform="rotate(240)"><path d="M0 -5 L1.4 -1.4 L-1.4 -1.4 Z"/></g>
      <g transform="rotate(300)"><path d="M0 -5 L1.4 -1.4 L-1.4 -1.4 Z"/></g>
    </g>
    <circle r="1.4" fill="#0a1a12"/>
  </g>

  <!-- Front wheel (right) -->
  <g transform="translate(65.5 66)">
    <circle r="8.2" fill="#0a1a12"/>
    <circle r="6.6" fill="#1a1d22"/>
    <circle r="5.1" fill="#ffffff"/>
    <g fill="#0a1a12">
      <path d="M0 -5 L1.4 -1.4 L-1.4 -1.4 Z"/>
      <g transform="rotate(60)"><path d="M0 -5 L1.4 -1.4 L-1.4 -1.4 Z"/></g>
      <g transform="rotate(120)"><path d="M0 -5 L1.4 -1.4 L-1.4 -1.4 Z"/></g>
      <g transform="rotate(180)"><path d="M0 -5 L1.4 -1.4 L-1.4 -1.4 Z"/></g>
      <g transform="rotate(240)"><path d="M0 -5 L1.4 -1.4 L-1.4 -1.4 Z"/></g>
      <g transform="rotate(300)"><path d="M0 -5 L1.4 -1.4 L-1.4 -1.4 Z"/></g>
    </g>
    <circle r="1.4" fill="#0a1a12"/>
  </g>

  <!-- Top body sheen highlight -->
  <path d="M26 47
           C34 44 42 42.6 50 42.6
           C58 42.6 65 43.8 72 46"
        stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" opacity="0.7" fill="none"/>
</svg>
